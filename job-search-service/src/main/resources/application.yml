server:
  port: 8082

spring:
  application:
    name: job-search-service

  datasource:
    url: jdbc:postgresql://localhost:5433/jobscheduler
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false
