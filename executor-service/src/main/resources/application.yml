server:
  port: 8085

spring:
  application:
    name: executor-service

  datasource:
    url: jdbc:postgresql://localhost:5433/jobscheduler
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

executor:
  thread-pool-size: 10
  heartbeat-interval-seconds: 10
  heartbeat-ttl-seconds: 30
  cancel-poll-interval-seconds: 5